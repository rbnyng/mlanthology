# Thematic sections for the Notable Works listing page.
# Each entry references a bibtex_key + year (for page lookup) and a
# human-written description explaining why this work matters.

title: "Notable Works"
subtitle: "Foundational documents from Bayes to the Bitter Lesson."
description: "Influential works not published at venues the anthology already indexes."

sections:
  - title: "The Foundations"
    entries:
      - key: "bayes1763misc-essay"
        year: "1763"
        description: "The foundation of everything probabilistic in ML."
      - key: "mcculloch1943misc-logical"
        year: "1943"
        description: "The first mathematical model of a neuron. Everything starts here."
      - key: "shannon1948misc-mathematical"
        year: "1948"
        description: "Entropy, mutual information, channel capacity. Every loss function in deep learning is downstream of this."
      - key: "turing1950misc-computing"
        year: "1950"
        description: "The imitation game and the question of whether machines can think."

  - title: "Neural Computation"
    entries:
      - key: "hebb1949misc-organization"
        year: "1949"
        description: "\"Neurons that fire together wire together.\" The origin of associative learning."
      - key: "rosenblatt1958misc-perceptron"
        year: "1958"
        description: "The birth of neural networks as computation."
      - key: "hubel1962misc-receptive"
        year: "1962"
        description: "The neuroscience that inspired convolutional networks."
      - key: "minsky1969misc-perceptrons"
        year: "1969"
        description: "The book that killed connectionism for a decade. The XOR problem."
      - key: "fukushima1980misc-neocognitron"
        year: "1980"
        description: "The origin of convolutional neural networks."
      - key: "hopfield1982misc-neural"
        year: "1982"
        description: "Brought physicists into neural networks, led to Boltzmann machines."
      - key: "rumelhart1986misc-learning"
        year: "1986"
        description: "Backpropagation."
      - key: "hochreiter1997misc-long"
        year: "1997"
        description: "Long Short-Term Memory. Sources close to the matter suggest that Schmidhuber anticipated this in 1993."
      - key: "lecun1998misc-gradientbased"
        year: "1998"
        description: "The LeNet paper."

  - title: "Statistical / Learning Theory"
    entries:
      - key: "robbins1951misc-stochastic"
        year: "1951"
        description: "SGD. The optimization paradigm of modern ML."
      - key: "solomonoff1964misc-formal"
        year: "1964"
        description: "Algorithmic probability, compression and intelligence."
      - key: "vapnik1971misc-uniform"
        year: "1971"
        description: "VC dimension. The theoretical foundation of statistical learning."
      - key: "dempster1977misc-maximum"
        year: "1977"
        description: "The EM algorithm. Cited constantly across all of machine learning."
      - key: "rissanen1978misc-modeling"
        year: "1978"
        description: "Minimum description length. The formal link between compression and learning."
      - key: "valiant1984misc-theory"
        year: "1984"
        description: "PAC learning. The origin of computational learning theory."
      - key: "cybenko1989misc-approximation"
        year: "1989"
        description: "The universal approximation theorem. One hidden layer can approximate any continuous function; why neural networks work at all."
      - key: "wolpert1996misc-lack"
        year: "1996"
        description: "The No Free Lunch theorem."
      - key: "amari1998misc-natural"
        year: "1998"
        description: "The natural gradient. Increasingly important as people realize Adam is an approximation of it."

  - title: "Reinforcement Learning"
    entries:
      - key: "bellman1957misc-dynamic"
        year: "1957"
        description: "The Bellman equation. The foundation of dynamic programming and RL."
      - key: "samuel1959misc-some"
        year: "1959"
        description: "Coined the term \"machine learning.\""
      - key: "sutton1988misc-learning"
        year: "1988"
        description: "TD learning. The bridge between dynamic programming and modern RL."
      - key: "watkins1989misc-learning"
        year: "1989"
        description: "Q-learning."
      - key: "schmidhuber1991misc-curious"
        year: "1991"
        description: "Intrinsic motivation, curiosity-driven learning. Predates the exploration-exploitation literature in deep RL."

  - title: "Information / Coding"
    entries:
      - key: "barlow1961misc-possible"
        year: "1961"
        description: "Efficient coding hypothesis, redundancy reduction. The intellectual ancestor of autoencoders and sparse coding."
      - key: "kolmogorov1965misc-three"
        year: "1965"
        description: "Three approaches to defining information. Algorithmic information theory."
      - key: "neal1996misc-bayesian"
        year: "1996"
        description: "The original treatment of Bayesian neural networks."

  - title: "AI Critiques"
    entries:
      - key: "dreyfus1965misc-alchemy"
        year: "1965"
        description: "The first philosophical critique of AI."
      - key: "lighthill1973misc-artificial"
        year: "1973"
        description: "The report that killed UK AI funding."
      - key: "brooks1991misc-intelligence"
        year: "1991"
        description: "The embodied cognition manifesto. Looks increasingly prescient in the age of robotics foundation models."

  - title: "Proposals and Founding Documents"
    entries:
      - key: "mccarthy1955misc-proposal"
        year: "1955"
        description: "A two-page funding application that named the field of artificial intelligence."
      - key: "selfridge1959misc-pandemonium"
        year: "1959"
        description: "Parallel feature detection — basically convolutional networks thirty years early."
      - key: "holland1975misc-adaptation"
        year: "1975"
        description: "The founding document of evolutionary computation."
      - key: "pearl1988misc-probabilistic"
        year: "1988"
        description: "Graphical models. Probabilistic reasoning made tractable."

  - title: "Blog Posts and Informal Publications"
    entries:
      - key: "karpathy2015misc-unreasonable"
        year: "2015"
        description: "Taught a generation how RNNs work."
      - key: "olah2015misc-understanding"
        year: "2015"
        description: "Neural network interpretability that set the standard for visual explanation."
      - key: "sutton2019misc-bitter"
        year: "2019"
        description: "The theoretical justification for the scaling hypothesis."
      - key: "kaplan2020misc-scaling"
        year: "2020"
        description: "The empirical backbone of the scaling hypothesis."